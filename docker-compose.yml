services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      DEBUG: "true"
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - type: bind
        source: C:\Users\User\Desktop\BRAIN
        target: /vault

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:8001
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
