services:
  - type: web
    name: ai-collab-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    sourceDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-collab-db
          property: connectionString
      - key: ZEN_API_KEY
        sync: false
      - key: ZEN_BASE_URL
        value: https://opencode.ai/zen/v1
      - key: ZEN_DEFAULT_MODEL
        value: deepseek-v4-flash-free
      - key: LLM_DEFAULT_PROVIDER
        value: zen
      - key: LLM_DEFAULT_MODEL
        value: deepseek-v4-flash-free
      - key: CORS_ORIGINS
        value: '["http://localhost:3000","https://buildanything.vercel.app","https://ai-collab-frontend-omega.vercel.app","https://*.vercel.app"]'

datastores:
  - type: postgres
    name: ai-collab-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
